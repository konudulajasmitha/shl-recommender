<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Recommender Chat</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 500px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        #chat-header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 14px; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .bot { background: #e9e9eb; color: black; align-self: flex-start; }
        #input-area { display: flex; border-top: 1px solid #ddd; padding: 10px; }
        #user-input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-right: 5px; }
        #send-btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .rec-link { display: block; margin-top: 5px; color: #0056b3; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">SHL Assessment Consultant</div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const API_URL = "https://shl-recommender-1-3m5i.onrender.com/chat";
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{ role: "user", content: text }] })
            });

            const data = await response.json();
            appendMessage('bot', data.reply, data.recommendations);
        } catch (error) {
            appendMessage('bot', "Error: Could not connect to the server.");
        }
    }

    function appendMessage(sender, text, recs = []) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;

        if (recs.length > 0) {
            recs.forEach(rec => {
                const link = document.createElement('a');
                link.className = 'rec-link';
                link.href = rec.url;
                link.target = '_blank';
                link.innerText = `View: ${rec.name}`;
                msgDiv.appendChild(link);
            });
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
